<!DOCTYPE html>
<html lang="{{ current_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if is_uzbek %}Sovg'alar Tugadi{% else %}Совғалар Түгеди{% endif %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            padding: 40px;
            background: rgba(255,200,100,0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,200,100,0.4);
            max-width: 400px;
        }

        h1 {
            font-family: 'Mountains of Christmas', cursive;
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,200,100,0.8);
            color: #ffb74d;
        }

        p {
            font-size: 20px;
            line-height: 1.6;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        /* Snow Effect */
        .snowflake {
            position: absolute;
            top: -10px;
            color: #fff;
            font-size: 1em;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }

        @keyframes fall {
            0% {
                top: -10%;
                opacity: 0.8;
            }
            100% {
                top: 110%;
                opacity: 0.2;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📦</div>
        <h1>{% if is_uzbek %}Kechirasiz!{% else %}Кешириң!{% endif %}</h1>
        <p>{{ message }}</p>
        <p style="margin-top: 20px;">{% if is_uzbek %}Keyinroq qayta urinib ko'ring.{% else %}Кейинирек қайта араласың.{% endif %}</p>
        <p style="margin-top: 20px; font-size: 50px;">🎄</p>
    </div>

    <script>
        // Snow Effect
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            snowflake.textContent = ['❄', '❅', '❆'][Math.floor(Math.random() * 3)];
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = Math.random() * 3 + 5 + 's';
            snowflake.style.opacity = Math.random() * 0.5 + 0.3;
            snowflake.style.fontSize = Math.random() * 15 + 10 + 'px';
            
            document.body.appendChild(snowflake);

            setTimeout(() => {
                snowflake.remove();
            }, 8000);
        }

        setInterval(createSnowflake, 200);
    </script>
</body>
</html>
