{% load static %}
<!DOCTYPE html>
<html lang="{{ current_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.new_year_gifts }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/premium.css' %}">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 238, 159, 0.95) 0 10%, transparent 24%),
                linear-gradient(135deg, #00a8c8 0%, #7adfbb 48%, #ffd166 100%);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        .language-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .language-switcher form {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.15);
            padding: 10px 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .language-switcher select {
            background: rgba(255,255,255,0.9);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
        }

        .language-switcher button {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
        }

        .container {
            text-align: center;
            color: white;
            padding: 40px;
            background: rgba(255,255,255,0.22);
            border-radius: 18px;
            backdrop-filter: blur(10px);
            box-shadow: 0 18px 50px rgba(0,78,92,0.22);
            border: 1px solid rgba(255,255,255,0.35);
            max-width: 680px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 0 4px 18px rgba(0,90,105,0.28);
        }

        p {
            font-size: 20px;
            line-height: 1.6;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .summer-particle {
            position: absolute;
            top: -10px;
            color: rgba(255,255,255,0.95);
            font-size: 1em;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
            text-shadow: 0 0 8px rgba(255,255,255,0.8);
        }

        @keyframes fall {
            0% {
                top: -10%;
                opacity: 0.8;
            }
            100% {
                top: 110%;
                opacity: 0.2;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="{% static 'logo/icon-gold-web.png' %}" alt="Mariyam Cosmetics" class="brand-logo">
        <h1>{{ t.new_year_gifts }}</h1>
        <p>{{ t.scan_qr_instruction }}</p>
        <p style="margin-top: 30px; font-size: 60px;">🎁✨🌺</p>
    </div>

    <script>
        function createSummerParticle() {
            const particle = document.createElement('div');
            particle.classList.add('summer-particle');
            particle.textContent = ['✦', '☀', '✺'][Math.floor(Math.random() * 3)];
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 3 + 5 + 's';
            particle.style.opacity = Math.random() * 0.45 + 0.35;
            particle.style.fontSize = Math.random() * 15 + 10 + 'px';
            
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 8000);
        }

        setInterval(createSummerParticle, 260);
    </script>
</body>
</html>
