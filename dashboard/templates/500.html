{% load static %}
<!DOCTYPE html>
<html lang="{{ current_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Ошибка сервера</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/premium.css' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #00a8c8 0%, #7adfbb 52%, #ffd166 100%);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            z-index: 1;
            padding: 40px 20px;
            max-width: 620px;
        }

        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-size: 120px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #ef476f;
            text-shadow: 0 8px 28px rgba(0, 90, 105, 0.28);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.92);
            line-height: 1.6;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #ef476f 0%, #ff6b6b 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 10px 24px rgba(239, 71, 111, 0.28);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #06a77d 0%, #008fa8 100%);
            box-shadow: 0 10px 24px rgba(0, 143, 168, 0.28);
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .summer-particle {
            position: fixed;
            top: -10px;
            color: white;
            font-size: 20px;
            z-index: 0;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="{% static 'logo/icon-gold-web.png' %}" alt="Mariyam Cosmetics" class="brand-logo-small">
        <div class="error-code">500</div>
        <h1>Ошибка сервера</h1>
        <p>Извините, на сервере произошла техническая ошибка. Попробуйте позже или обратитесь к администратору.</p>
        <div class="buttons">
            <a href="javascript:history.back()" class="btn">← Назад</a>
            <a href="/" class="btn btn-secondary">🏠 На главную</a>
        </div>
    </div>

    <script>
        function createSummerParticle() {
            const particle = document.createElement('div');
            particle.className = 'summer-particle';
            particle.textContent = ['✦', '☀', '✺'][Math.floor(Math.random() * 3)];
            particle.style.left = Math.random() * window.innerWidth + 'px';
            particle.style.animationDuration = (Math.random() * 3 + 2) + 's';
            particle.style.opacity = Math.random() * 0.45 + 0.35;
            particle.style.fontSize = (Math.random() * 10 + 10) + 'px';
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 5000);
        }

        setInterval(createSummerParticle, 260);
    </script>
</body>
</html>
