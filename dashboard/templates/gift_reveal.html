{% load static %}
<!DOCTYPE html>
<html lang="{{ current_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.new_year_gift }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            perspective: 1200px;
        }

        .language-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .language-switcher form {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.15);
            padding: 10px 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .language-switcher select {
            background: rgba(255,255,255,0.9);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .language-switcher button {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .language-switcher button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,215,0,0.4);
        }

        .container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .instruction {
            position: absolute;
            top: -120px;
            color: #fff;
            font-family: 'Mountains of Christmas', cursive;
            font-size: 32px;
            text-align: center;
            width: 100%;
            text-shadow: 0 0 15px rgba(255,215,0,0.8);
            animation: float 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Gift Box Image Styles */
        .gift-box {
            width: 250px;
            height: 250px;
            position: relative;
            cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        .gift-box:hover {
            transform: scale(1.08);
            filter: drop-shadow(0 25px 40px rgba(0,0,0,0.6));
        }
        
        .gift-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .gift-box.shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.05) rotate(5deg); }
            50% { transform: scale(1.05) rotate(-5deg); }
            75% { transform: scale(1.05) rotate(5deg); }
        }

        .gift-box.exploded {
            cursor: default;
            filter: none;
        }

        .gift-box.exploded img {
            opacity: 0;
            transform: scale(0) rotate(720deg);
            transition: all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Paper Message */
        .message-paper {
            position: absolute;
            width: 300px;
            height: auto;
            background: #fff;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            padding: 100px 35px 35px 35px;
            box-sizing: border-box;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center;
            opacity: 0;
            transition: all 0.6s ease-in-out 0.6s;
            z-index: 100;
            pointer-events: none;
            max-height: 90vh;
            overflow-y: auto;
        }

        .gift-box.exploded .message-paper {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            z-index: 1000;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            pointer-events: all;
        }

        #logoAfterOpen {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: auto;
            z-index: 10;
            opacity: 1;
            display: block;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));
        }

        .gift-title {
            font-family: 'Mountains of Christmas', cursive;
            font-size: 26px;
            color: #c62828;
            margin-top: 20px;
            margin-bottom: 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
            line-height: 1.3;
        }

        .gift-name {
            font-size: 24px;
            font-weight: bold;
            color: #1565c0;
            padding: 15px 20px;
            background: linear-gradient(135deg, #fff9c4 0%, #ffecb3 100%);
            border-radius: 12px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.08), 0 2px 8px rgba(255,193,7,0.3);
            margin-bottom: 15px;
            border: 2px solid #ffd54f;
        }

        .claim-form {
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e3e3e3;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s;
            font-family: 'Roboto', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1976d2;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
        }

        .claim-btn {
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
            color: white;
            border: none;
            padding: 16px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            font-family: 'Mountains of Christmas', cursive;
            box-shadow: 0 4px 15px rgba(25, 118, 210, 0.3);
        }

        .claim-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(25, 118, 210, 0.5);
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
        }

        .claim-btn:active {
            transform: translateY(0);
        }

        /* Glow Effect */
        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255,215,0,0.4), transparent 70%);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.8;
            }
        }

        /* Snow Effect */
        .snowflake {
            position: absolute;
            top: -10px;
            color: #fff;
            font-size: 1em;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }

        @keyframes fall {
            0% {
                top: -10%;
                opacity: 0.8;
            }
            100% {
                top: 110%;
                opacity: 0.2;
            }
        }


    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <!-- Language Switcher -->
    <div class="language-switcher">
        <form action="{% url 'set_language' %}" method="post">
            {% csrf_token %}
            <input name="next" type="hidden" value="{{ request.path }}">
            <select name="language">
                <option value="uz" {% if current_language == 'uz' %}selected{% endif %}>O'zbekcha</option>
                <option value="kaa" {% if current_language == 'kaa' %}selected{% endif %}>Qaraqalpaqsha</option>
            </select>
            <button type="submit">OK</button>
        </form>
    </div>

    <div class="container">
        <div class="instruction">{{ t.click_to_open }}</div>
        <div class="gift-box" id="giftBox">
            <div class="glow"></div>
            <img src="{% static 'gift.png' %}" alt="{{ t.new_year_gift }}" id="giftBoxImage">
            
            <!-- The Gift Message Inside -->
            <div class="message-paper">
                <img src="{% static 'logo/logo.png' %}" alt="Logo" id="logoAfterOpen">
                <div class="gift-title">🎄 {{ t.happy_new_year }} 🎄</div>
                <div class="gift-name" id="giftName">{{ gift_name }}</div>
                <div style="font-size: 30px; margin: 15px 0;">🎁✨🎉</div>
            </div>
        </div>
    </div>
    
    <script>
        const giftBox = document.getElementById('giftBox');
        const instruction = document.querySelector('.instruction');
        let isOpen = false;

        giftBox.addEventListener('click', () => {
            if (isOpen) return;
            
            giftBox.classList.add('shake');
            
            setTimeout(() => {
                giftBox.classList.remove('shake');
                openGift();
            }, 500);
        });

        function openGift() {
            isOpen = true;
            giftBox.classList.add('exploded');
            instruction.style.opacity = '0';
            // Confetti explosion
            const duration = 3000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 7,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#bb0000', '#ffffff', '#ffd700', '#00ff00']
                });
                confetti({
                    particleCount: 7,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#bb0000', '#ffffff', '#ffd700', '#00ff00']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            setTimeout(() => {
                confetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.6 },
                    colors: ['#FFD700', '#FF0000', '#FFFFFF', '#008000'],
                    scalar: 1.2
                });
            }, 300);
        }

        // Snow Effect
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.classList.add('snowflake');
            snowflake.textContent = ['❄', '❅', '❆'][Math.floor(Math.random() * 3)];
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = Math.random() * 3 + 5 + 's';
            snowflake.style.opacity = Math.random() * 0.5 + 0.3;
            snowflake.style.fontSize = Math.random() * 15 + 10 + 'px';
            
            document.body.appendChild(snowflake);

            setTimeout(() => {
                snowflake.remove();
            }, 8000);
        }

        setInterval(createSnowflake, 200);
    </script>
</body>
</html>
