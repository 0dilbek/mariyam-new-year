{% load static %}
<!DOCTYPE html>
<html lang="{{ current_language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.qr_used }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/premium.css' %}">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #00a8c8 0%, #7adfbb 52%, #ffd166 100%);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            padding: 40px;
            background: rgba(255,100,100,0.2);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,100,100,0.4);
            max-width: 400px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,100,100,0.8);
            color: #ff6b6b;
        }

        p {
            font-size: 20px;
            line-height: 1.6;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .summer-particle {
            position: absolute;
            top: -10px;
            color: #fff;
            font-size: 1em;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }

        @keyframes fall {
            0% {
                top: -10%;
                opacity: 0.8;
            }
            100% {
                top: 110%;
                opacity: 0.2;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="{% static 'logo/icon-gold-web.png' %}" alt="Mariyam Cosmetics" class="brand-logo-small">
        <p>{{ message }}</p>
        <p style="margin-top: 20px; font-size: 50px;">😔</p>
    </div>

    <script>
        function createSummerParticle() {
            const particle = document.createElement('div');
            particle.classList.add('summer-particle');
            particle.textContent = ['✦', '☀', '✺'][Math.floor(Math.random() * 3)];
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 3 + 5 + 's';
            particle.style.opacity = Math.random() * 0.45 + 0.35;
            particle.style.fontSize = Math.random() * 15 + 10 + 'px';
            
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 8000);
        }

        setInterval(createSummerParticle, 260);
    </script>
</body>
</html>
